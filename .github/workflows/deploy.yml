name: build-and-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PUBLIC_DEFAULT_NAME: ${{ secrets.PUBLIC_DEFAULT_NAME }}
      PUBLIC_DEFAULT_ADDRESS: ${{ secrets.PUBLIC_DEFAULT_ADDRESS }}
      PUBLIC_DEFAULT_ZIP: ${{ secrets.PUBLIC_DEFAULT_ZIP }}
      PUBLIC_DEFAULT_CITY: ${{ secrets.PUBLIC_DEFAULT_CITY }}
      PUBLIC_DEFAULT_COUNTRY: ${{ secrets.PUBLIC_DEFAULT_COUNTRY }}
      PUBLIC_DEFAULT_IBAN: ${{ secrets.PUBLIC_DEFAULT_IBAN }}
      PUBLIC_DEFAULT_EMAIL: ${{ secrets.PUBLIC_DEFAULT_EMAIL }}
      PUBLIC_DEFAULT_PHONE: ${{ secrets.PUBLIC_DEFAULT_PHONE }}
      PUBLIC_DEFAULT_VAT_NUMBER: ${{ secrets.PUBLIC_DEFAULT_VAT_NUMBER }}

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
